<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CalorieAI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b2a38;--card:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.15);
  --border2:rgba(255,255,255,0.40);--text:#dff0f7;--sub:#7cb8d0;--muted:#89cce0;
  --btn:#dff0f7;--btn-text:#0b2a38;--div:rgba(255,255,255,0.10);
  --upload:rgba(255,255,255,0.11);--protein:#f87171;--fat:#fbbf24;--carbs:#34d399;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px 16px 64px;min-height:100vh}
.wrap{max-width:420px;margin:0 auto}
.label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-family:monospace;margin-bottom:4px}
h1{font-size:24px;font-weight:700;color:var(--text)}
.subtitle{font-size:13px;color:var(--sub);margin-top:4px;margin-bottom:24px}

/* Upload */
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:16px;text-align:center;background:var(--upload);margin-bottom:16px}
.cam-row{display:flex;gap:10px;margin-top:12px}
.cam-btn{flex:1;cursor:pointer}
.cam-card{border:1px solid var(--border2);border-radius:10px;padding:12px 8px;text-align:center;background:rgba(255,255,255,0.06)}
.cam-icon{font-size:22px;margin-bottom:5px}
.cam-title{font-size:13px;color:var(--text);font-weight:600}
.cam-hint{font-size:11px;color:var(--muted);margin-top:2px}
.cam-btn input{display:none}
.upload-title{font-size:14px;color:var(--sub);font-weight:600}
.preview-img{width:100%;max-height:230px;object-fit:cover;border-radius:8px;margin-bottom:12px}
.btn-row{display:flex;gap:8px}
.btn{background:var(--btn);color:var(--btn-text);border:none;border-radius:8px;padding:11px 0;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:default}
.btn-full{width:100%}
.btn-icon{background:none;border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:0 14px;cursor:pointer;font-size:16px}

/* Result card */
.card{border:2px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:20px;background:var(--card)}
.dish-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.dish-meta{font-size:11px;color:var(--muted);font-family:monospace;margin-bottom:14px}

/* Weight editor */
.weight-box{background:rgba(255,255,255,0.05);border-radius:8px;padding:10px 12px;margin-bottom:14px}
.weight-label{font-size:12px;color:var(--sub);margin-bottom:6px;display:flex;justify-content:space-between}
.weight-label span{color:var(--muted);font-size:11px}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row input[type=range]{flex:1;accent-color:var(--btn);height:4px}
.num-input{width:60px;background:rgba(255,255,255,0.12);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:13px;padding:3px 6px;text-align:right}
.unit{font-size:11px;color:var(--muted)}

/* КЖБУ */
.kcal-row{border-top:2px solid var(--border2);padding:10px 0;display:flex;justify-content:space-between;align-items:baseline}
.kcal-label{font-weight:700;color:var(--text)}
.kcal-val{font-family:monospace;font-size:26px;font-weight:700;color:var(--text)}
.macro-row{border-top:1px solid var(--div);padding:8px 0;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.notes-text{font-size:11px;color:var(--muted);margin-top:10px}

/* Diary */
.section-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.section-title{font-size:16px;font-weight:700;color:var(--text)}
.section-date{font-size:11px;color:var(--muted);font-family:monospace}
.totals-card{border:2px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--card)}
.totals-main{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:8px}
.totals-label{font-weight:700;color:var(--text)}
.totals-val{font-family:monospace;font-size:22px;font-weight:700;color:var(--text)}
.macros{display:flex;justify-content:space-between;font-family:monospace;font-size:12px}
.entry-item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--div);padding:10px 0}
.entry-name{font-size:14px;color:var(--text)}
.entry-meta{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px}
.del-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px}
.empty-msg{font-size:13px;color:var(--muted);margin-bottom:12px}
.clear-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--muted);text-decoration:underline;margin-top:12px;padding:0}

/* Sub banner */
.sub-banner{border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:18px;background:rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center;gap:12px}
.sub-text{font-size:13px;color:var(--sub)}
.sub-btn{background:var(--btn);color:var(--btn-text);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.free-badge{font-size:11px;color:var(--muted);font-family:monospace;text-align:right;margin-bottom:10px}
.error-msg{color:#f87171;font-size:13px;margin-bottom:12px}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:16px;height:16px;border:2px solid var(--btn-text);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="wrap">

  <div class="label">ии-анализ фото</div>
  <h1>CalorieAI 🥗</h1>
  <p class="subtitle">Сфотографируй блюдо — ИИ посчитает калории и БЖУ за секунды.</p>

  <!-- Sub banner -->
  <div class="sub-banner" id="sub-banner" style="display:none">
    <div class="sub-text" id="sub-text"></div>
    <button class="sub-btn" id="sub-btn">Подписка ⭐</button>
  </div>

  <!-- Upload -->
  <div class="upload-zone">
    <div id="source-block">
      <div class="upload-title">Как добавить блюдо?</div>
      <div class="cam-row">
        <label class="cam-btn">
          <div class="cam-card">
            <div class="cam-icon">📸</div>
            <div class="cam-title">Сфотографировать</div>
            <div class="cam-hint">открыть камеру</div>
          </div>
          <input type="file" accept="image/*" capture="environment" id="camera-input"/>
        </label>
        <label class="cam-btn">
          <div class="cam-card">
            <div class="cam-icon">🖼</div>
            <div class="cam-title">Из галереи</div>
            <div class="cam-hint">выбрать фото</div>
          </div>
          <input type="file" accept="image/*" id="gallery-input"/>
        </label>
      </div>
    </div>
    <div id="preview-block" style="display:none">
      <img id="preview-img" class="preview-img" alt="фото блюда"/>
      <div class="btn-row">
        <button class="btn" id="analyze-btn" style="flex:1">Проанализировать</button>
        <button class="btn-icon" id="reset-btn">↺</button>
      </div>
    </div>
  </div>

  <div class="free-badge" id="free-badge"></div>
  <div class="error-msg" id="error" style="display:none"></div>

  <!-- Result card -->
  <div class="card" id="result-card" style="display:none">
    <div class="dish-name" id="dish-name"></div>
    <div class="dish-meta" id="dish-meta"></div>

    <!-- Редактор веса -->
    <div class="weight-box">
      <div class="weight-label">
        <span>Вес порции</span>
        <span>меняй → КЖБУ пересчитается</span>
      </div>
      <div class="slider-row">
        <input type="range" id="weight-slider" min="50" max="1000" step="10" value="300"/>
        <input type="number" id="weight-input" class="num-input" min="10" max="3000" value="300"/>
        <span class="unit">г</span>
      </div>
    </div>

    <div class="kcal-row">
      <span class="kcal-label">Калории</span>
      <span class="kcal-val" id="res-kcal">0</span>
    </div>
    <div class="macro-row">
      <span style="color:var(--protein)">Белки</span>
      <span style="color:var(--protein);font-family:monospace" id="res-protein">0 г</span>
    </div>
    <div class="macro-row">
      <span style="color:var(--fat)">Жиры</span>
      <span style="color:var(--fat);font-family:monospace" id="res-fat">0 г</span>
    </div>
    <div class="macro-row">
      <span style="color:var(--carbs)">Углеводы</span>
      <span style="color:var(--carbs);font-family:monospace" id="res-carbs">0 г</span>
    </div>
    <div class="notes-text" id="res-notes"></div>
    <button class="btn btn-full" id="add-btn" style="margin-top:14px">Добавить в дневник ✓</button>
  </div>

  <!-- Diary -->
  <div class="section-header">
    <span class="section-title">Сегодня</span>
    <span class="section-date" id="today-date"></span>
  </div>
  <div class="totals-card" id="diary-totals" style="display:none">
    <div class="totals-main">
      <span class="totals-label">Итого за день</span>
      <span class="totals-val" id="day-kcal">0</span>
    </div>
    <div class="macros">
      <span style="color:var(--protein)" id="day-p"></span>
      <span style="color:var(--fat)" id="day-f"></span>
      <span style="color:var(--carbs)" id="day-c"></span>
    </div>
  </div>
  <p class="empty-msg" id="empty-msg">Пока пусто — добавь первое блюдо выше.</p>
  <ul id="entry-list" style="list-style:none;padding:0;margin:0"></ul>
  <button class="clear-btn" id="clear-btn" style="display:none">Очистить дневник за сегодня</button>

</div>
<script>
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const INIT_DATA = tg?.initData||"";
const BASE = "";
const CONF = {low:"низкая",medium:"средняя",high:"высокая"};

const $  = id => document.getElementById(id);
const show = id => $(id).style.display="";
const hide = id => $(id).style.display="none";
function setErr(msg){$("error").textContent=msg; msg?show("error"):hide("error");}

$("today-date").textContent = new Date().toLocaleDateString("ru-RU",{day:"numeric",month:"long"});

// ── State ──────────────────────────────────────────────────────────────────
let imageBase64=null, mediaType="image/jpeg", baseResult=null, diary=[];

// Базовые значения на 100г (для пересчёта при смене веса)
let base100 = {calories:0, protein_g:0, fat_g:0, carbs_g:0};

// ── File ───────────────────────────────────────────────────────────────────
function handleFile(e){
  const file=e.target.files?.[0]; if(!file) return;
  mediaType=file.type||"image/jpeg";
  const reader=new FileReader();
  reader.onload=()=>{
    imageBase64=reader.result.split(",")[1];
    $("preview-img").src=reader.result;
    hide("source-block"); show("preview-block");
    hide("result-card"); setErr("");
  };
  reader.readAsDataURL(file);
}
$("camera-input").addEventListener("change",handleFile);
$("gallery-input").addEventListener("change",handleFile);

$("reset-btn").addEventListener("click",()=>{
  imageBase64=null; baseResult=null;
  $("camera-input").value=""; $("gallery-input").value="";
  hide("preview-block"); show("source-block"); hide("result-card"); setErr("");
});

// ── Weight slider ──────────────────────────────────────────────────────────
function updateByWeight(w){
  if(!base100.calories) return;
  const ratio = w/100;
  $("res-kcal").textContent   = Math.round(base100.calories  * ratio);
  $("res-protein").textContent= (Math.round(base100.protein_g* ratio*10)/10)+" г";
  $("res-fat").textContent    = (Math.round(base100.fat_g    * ratio*10)/10)+" г";
  $("res-carbs").textContent  = (Math.round(base100.carbs_g  * ratio*10)/10)+" г";
}

$("weight-slider").addEventListener("input",e=>{
  $("weight-input").value=e.target.value;
  updateByWeight(Number(e.target.value));
});
$("weight-input").addEventListener("change",e=>{
  const w=Math.max(10,Number(e.target.value));
  $("weight-slider").value=Math.min(w,1000);
  updateByWeight(w);
});

// ── Analyze ────────────────────────────────────────────────────────────────
$("analyze-btn").addEventListener("click",async()=>{
  if(!imageBase64) return;
  $("analyze-btn").disabled=true;
  $("analyze-btn").innerHTML='<span class="spin"></span> Анализирую...';
  setErr("");

  try{
    const resp=await fetch(BASE+"/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({init_data:INIT_DATA,image_base64:imageBase64,media_type:mediaType})
    });
    if(resp.status===402){setErr("Бесплатный лимит исчерпан. Оформи подписку."); return;}
    if(!resp.ok){
      const txt=await resp.text();
      setErr("Ошибка сервера. Попробуй ещё раз."); 
      console.error(txt); return;
    }
    const data=await resp.json();
    const r=data.result;

    baseResult=r;
    const w=Number(r.estimated_weight_g)||300;

    // Считаем значения на 100г из ответа (ИИ даёт итог за порцию)
    base100 = {
      calories:  (Number(r.calories) /w)*100,
      protein_g: (Number(r.protein_g)/w)*100,
      fat_g:     (Number(r.fat_g)    /w)*100,
      carbs_g:   (Number(r.carbs_g)  /w)*100,
    };

    // Отображаем
    $("dish-name").textContent=r.dish_name||"Блюдо";
    $("dish-meta").textContent=`≈ ${w} г · уверенность: ${CONF[r.confidence]||r.confidence||"—"}`;
    $("weight-slider").value=Math.min(w,1000);
    $("weight-input").value=w;
    $("res-kcal").textContent   =Math.round(r.calories||0);
    $("res-protein").textContent=(r.protein_g||0)+" г";
    $("res-fat").textContent    =(r.fat_g||0)+" г";
    $("res-carbs").textContent  =(r.carbs_g||0)+" г";
    $("res-notes").textContent  =r.notes||"";
    show("result-card");
    updateFreeBadge(data.scans_left,data.is_subscribed);
  }catch(e){
    console.error(e);
    setErr("Не удалось подключиться к серверу.");
  }finally{
    $("analyze-btn").disabled=false;
    $("analyze-btn").textContent="Проанализировать";
  }
});

// ── Add to diary ───────────────────────────────────────────────────────────
$("add-btn").addEventListener("click",async()=>{
  if(!baseResult) return;
  $("add-btn").disabled=true;
  const w=Number($("weight-input").value)||Number(baseResult.estimated_weight_g)||300;
  const ratio=w/100;
  const entry={
    dish_name:$("dish-name").textContent,
    estimated_weight_g:w,
    calories: Math.round(base100.calories *ratio),
    protein_g:Math.round(base100.protein_g*ratio*10)/10,
    fat_g:    Math.round(base100.fat_g    *ratio*10)/10,
    carbs_g:  Math.round(base100.carbs_g  *ratio*10)/10,
    confidence:baseResult.confidence||"medium",
    notes:baseResult.notes||""
  };
  try{
    const resp=await fetch(BASE+"/diary/add",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({init_data:INIT_DATA,entry})
    });
    const data=await resp.json();
    if(data.ok){
      diary.push({id:data.id,
        time:new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}),
        dish_name:entry.dish_name, calories:entry.calories,
        protein_g:entry.protein_g, fat_g:entry.fat_g,
        carbs_g:entry.carbs_g, weight_g:w});
      renderDiary();
      hide("result-card"); hide("preview-block"); show("source-block");
      imageBase64=null; baseResult=null;
      $("camera-input").value=""; $("gallery-input").value="";
    }
  }catch{setErr("Не удалось сохранить.");}
  finally{$("add-btn").disabled=false;}
});

// ── Diary ──────────────────────────────────────────────────────────────────
async function loadDiary(){
  if(!INIT_DATA) return;
  try{
    const resp=await fetch(BASE+`/diary/today?init_data=${encodeURIComponent(INIT_DATA)}`);
    const data=await resp.json();
    diary=(data.entries||[]).map(e=>({...e,time:e.time||""}));
    renderDiary();
  }catch(e){console.error(e);}
}

function renderDiary(){
  const list=$("entry-list"); list.innerHTML="";
  if(!diary.length){show("empty-msg");hide("diary-totals");hide("clear-btn");return;}
  hide("empty-msg");show("diary-totals");show("clear-btn");
  let tC=0,tP=0,tF=0,tCa=0;
  diary.forEach(e=>{
    tC+=Number(e.calories)||0; tP+=Number(e.protein_g)||0;
    tF+=Number(e.fat_g)||0; tCa+=Number(e.carbs_g)||0;
    const li=document.createElement("li");
    li.className="entry-item";
    li.innerHTML=`
      <div>
        <div class="entry-name">${e.dish_name}</div>
        <div class="entry-meta">${e.time} · ${Math.round(e.calories)} ккал · ${Math.round(e.weight_g||0)} г</div>
      </div>
      <button class="del-btn" data-id="${e.id}">✕</button>`;
    list.appendChild(li);
  });
  $("day-kcal").textContent=Math.round(tC);
  $("day-p").textContent=`Б ${Math.round(tP)} г`;
  $("day-f").textContent=`Ж ${Math.round(tF)} г`;
  $("day-c").textContent=`У ${Math.round(tCa)} г`;
  list.querySelectorAll(".del-btn").forEach(btn=>{
    btn.addEventListener("click",()=>deleteEntry(btn.dataset.id));
  });
}

async function deleteEntry(id){
  try{
    await fetch(BASE+`/diary/${id}`,{method:"DELETE",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({init_data:INIT_DATA})});
    diary=diary.filter(e=>String(e.id)!==String(id));
    renderDiary();
  }catch{setErr("Не удалось удалить.");}
}
$("clear-btn").addEventListener("click",async()=>{
  for(const e of [...diary]) await deleteEntry(e.id);
});

// ── Subscription ───────────────────────────────────────────────────────────
async function loadSubStatus(){
  if(!INIT_DATA) return;
  try{
    const resp=await fetch(BASE+`/subscription/status?init_data=${encodeURIComponent(INIT_DATA)}`);
    const data=await resp.json();
    updateFreeBadge(data.free_left,data.is_subscribed);
  }catch{}
}
function updateFreeBadge(left,isSub){
  if(isSub){$("free-badge").textContent="✓ Подписка активна";hide("sub-banner");return;}
  if(left!=null){
    $("free-badge").textContent=`Бесплатных сканов: ${left}`;
    if(left<=3) showSubBanner(left);
  }
}
function showSubBanner(left){
  $("sub-text").innerHTML=left===0
    ?"<b>Лимит исчерпан.</b> Оформи подписку."
    :`Осталось <b>${left}</b> скана. Подпишись — сканируй без ограничений.`;
  show("sub-banner");
}
$("sub-btn").addEventListener("click",async()=>{
  $("sub-btn").disabled=true;
  try{
    await fetch(BASE+"/subscription/buy",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({init_data:INIT_DATA})});
    if(tg)tg.close(); else alert("Инвойс отправлен в бот!");
  }catch{}finally{$("sub-btn").disabled=false;}
});

// ── Init ───────────────────────────────────────────────────────────────────
loadSubStatus();
loadDiary();
</script>
</body>
</html>
